<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Слова в ураган — Particle Tornado</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: Arial, sans-serif; }
        canvas { display: block; }
        #controls {
            position: absolute; top: 10px; left: 10px; color: white; z-index: 10;
        }
        input, button { margin: 5px; padding: 8px; }
    </style>
</head>
<body>
    <div id="controls">
        <input type="text" id="textInput" value="УРАГАН" placeholder="Введите текст">
        <button onclick="explodeText()">Запустить ураган!</button>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let particles = [];
        let width, height;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4 - 1; // небольшой подъём вверх
                this.color = color;
                this.size = Math.random() * 4 + 2;
                this.life = 300 + Math.random() * 200; // сколько кадров жить
                this.angle = Math.random() * Math.PI * 2;
                this.angularSpeed = (Math.random() - 0.5) * 0.2;
                this.radius = 0; // для спирального движения
            }

            update() {
                // Спиральное движение (ураган)
                this.angle += this.angularSpeed;
                this.radius += 0.15; // раскручиваемся

                const centerX = width / 2;
                const centerY = height * 0.7;

                // Притяжение к центру урагана + спираль
                const dx = centerX - this.x;
                const dy = centerY - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy) || 1;

                this.vx += (dx / dist) * 0.08;     // притяжение к центру
                this.vy += (dy / dist) * 0.05 - 0.12; // подъём вверх

                // Добавляем вихрь
                this.vx += Math.sin(this.angle) * 0.6;
                this.vy += Math.cos(this.angle) * 0.4;

                this.x += this.vx;
                this.y += this.vy;

                this.vx *= 0.98; // трение
                this.vy *= 0.98;

                this.life--;
                this.size *= 0.995; // медленно уменьшаемся
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life / 400;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Получаем позиции пикселей текста
        function getTextParticles(text) {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCanvas.width = width;
            tempCanvas.height = height;

            tempCtx.font = 'bold 120px Arial';
            tempCtx.fillStyle = 'white';
            tempCtx.textAlign = 'center';
            tempCtx.textBaseline = 'middle';

            const lines = text.split('\n');
            const lineHeight = 130;
            const startY = height / 2 - (lines.length - 1) * lineHeight / 2;

            lines.forEach((line, i) => {
                tempCtx.fillText(line, width / 2, startY + i * lineHeight);
            });

            const imageData = tempCtx.getImageData(0, 0, width, height).data;
            const particlesArray = [];

            for (let y = 0; y < height; y += 3) {        // шаг 3 для производительности
                for (let x = 0; x < width; x += 3) {
                    const index = (y * width + x) * 4;
                    if (imageData[index + 3] > 128) {   // если пиксель непрозрачный
                        const hue = (x / width) * 360;  // красивый градиент цвета
                        particlesArray.push({
                            x: x,
                            y: y,
                            color: `hsl(${hue}, 100%, 70%)`
                        });
                    }
                }
            }
            return particlesArray;
        }

        function explodeText() {
            const input = document.getElementById('textInput').value || "УРАГАН";
            particles = []; // очищаем старые

            const textPoints = getTextParticles(input);

            textPoints.forEach(point => {
                const p = new Particle(point.x, point.y, point.color);
                // Даём начальный импульс разлёта
                p.vx = (point.x - width/2) * 0.05 + (Math.random() - 0.5) * 8;
                p.vy = (point.y - height/2) * 0.03 - 5; // вверх
                particles.push(p);
            });
        }

        function animate() {
            // Полупрозрачный чёрный фон для шлейфа
            ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
            ctx.fillRect(0, 0, width, height);

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();

                if (p.life <= 0 || p.size < 0.5) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        // Старт
        animate();

        // Автоматический запуск при загрузке
        window.onload = () => {
            setTimeout(() => explodeText(), 500);
        };
    </script>
</body>
</html>
